# Release Please Workflow
#
# Maintains a standing "Release PR" that accumulates changes.
# Merging the PR creates a GitHub release, which triggers publish.yml.
#
# Release chain:
#   push to main → release-please updates Release PR
#       ↓ (merge Release PR)
#   release-please creates GitHub release
#       ↓ (release: published event)
#   publish.yml builds + signs Docker images
#
# Config: release-please-config.json + .release-please-manifest.json

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ steps.app-token.outputs.token }}
