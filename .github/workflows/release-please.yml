# Release Please Workflow
#
# Maintains a standing "Release PR" that accumulates changes.
# Merging the PR creates a GitHub release, which triggers publish.yml.
#
# Release chain:
#   push to main → release-please updates Release PR
#       ↓ (merge Release PR)
#   release-please creates GitHub release
#       ↓ (release: published event)
#   publish.yml builds + signs Docker images
#
# Config: release-please-config.json + .release-please-manifest.json

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
