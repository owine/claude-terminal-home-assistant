# OPTIONAL WORKFLOW: Claude Code Automated PR Review
#
# This workflow automatically reviews pull requests using Claude Code's AI analysis.
#
# How it works:
# 1. PR is opened, updated, or marked ready for review
# 2. Claude Code analyzes the diff, code quality, and potential issues
# 3. Provides inline comments and suggestions
# 4. Checks for common mistakes, security issues, and best practices
#
# Requirements:
# - CLAUDE_CODE_OAUTH_TOKEN secret configured in repository settings
# - Active Claude Code subscription
#
# This is NOT required for the app to function. It's a development productivity
# tool that can be disabled without affecting the core project.
#
# Configuration:
# - Skips Renovate and release-please bot PRs to conserve CI minutes
# - Can be customized to filter by PR author or file paths
#
# See: https://github.com/anthropics/claude-code-action

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Skip GitHub Actions workflow updates - claude-review errors on YAML workflows
    paths-ignore:
      - ".github/workflows/**"

jobs:
  claude-review:
    # Skip forked PRs, Renovate bot PRs, and release-please PRs
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'renovate[bot]' &&
      github.event.pull_request.user.login != 'claude-terminal-release-bot[bot]'

    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@5fb899572b81d2bb648d4d187173a2f423a9677c # v1.0.96
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Renovate bot PRs are skipped at the job level to conserve CI minutes
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
