name: Publish

on:
  release:
    types: [published]

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for cosign
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: home-assistant/builder@2026.02.1
        with:
          args: |
            --amd64 \
            --aarch64 \
            --cosign \
            --target ./claude-terminal \
            --image "claude-terminal-prowine-{arch}" \
            --docker-hub ghcr.io/${{ github.repository_owner }}

  image-scan:
    name: Scan published image
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      packages: read  # Pull image from ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from release tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "ghcr.io/${{ github.repository_owner }}/claude-terminal-prowine-amd64:${{ steps.version.outputs.version }}"
          scan-type: image
          severity: CRITICAL,HIGH
          exit-code: "1"
          scanners: vuln
          cache: "false"
