name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every Monday at 9am UTC (aligns with Renovate schedule)
    - cron: "0 9 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  filesystem-scan:
    name: Filesystem scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Advisory: never blocks merges (vulnerabilities are remediated by Renovate's
      # grouped, auto-merging security PRs). Findings are surfaced in the job summary,
      # and non-PR runs (push to main / weekly schedule) open a tracking issue.
      - name: Run Trivy filesystem scan
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: .trivy.yaml
          cache: "false"
          format: table
          output: trivy-fs-results.txt

      # Cap the report so large result sets don't blow past the job-summary (1 MiB)
      # or issue-body (64 KiB) limits. Used by both the summary and the issue.
      - name: Prepare findings report
        if: steps.trivy.outcome == 'failure'
        run: |
          max=500
          {
            head -n "$max" trivy-fs-results.txt
            if [ "$(wc -l < trivy-fs-results.txt)" -gt "$max" ]; then
              echo "... (truncated at ${max} lines; see the workflow logs for the full output)"
            fi
          } > trivy-report.txt

      - name: Publish results to job summary
        if: always()
        env:
          TRIVY_OUTCOME: ${{ steps.trivy.outcome }}
        run: |
          {
            echo "## Trivy filesystem scan"
            if [ "$TRIVY_OUTCOME" = "failure" ]; then
              echo "### ⚠️ CRITICAL/HIGH fixable findings"
              echo ""
              echo '```'
              cat trivy-report.txt || true
              echo '```'
            else
              echo "✅ No CRITICAL/HIGH fixable vulnerabilities found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open or update tracking issue on findings
        if: steps.trivy.outcome == 'failure' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="🔒 Trivy filesystem scan: fixable vulnerabilities detected"
          {
            echo "The Trivy filesystem scan found CRITICAL/HIGH vulnerabilities with fixes available."
            echo "Renovate opens grouped, auto-merging security PRs to remediate these."
            echo ""
            echo "<details><summary>Scan output</summary>"
            echo ""
            echo '```'
            cat trivy-report.txt || true
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "_Source run: ${RUN_URL}_"
          } > issue-body.md
          gh label create security --color D93F0B --description "Security issues and updates" --force >/dev/null 2>&1 || true
          # Tolerate transient API failures (advisory job) and match the title exactly.
          existing=$(gh issue list --label security --state open --json number,title 2>/dev/null \
            | jq -r --arg t "$title" 'map(select(.title == $t)) | .[0].number // empty' || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file issue-body.md
          else
            gh issue create --title "$title" --label security --body-file issue-body.md
          fi
