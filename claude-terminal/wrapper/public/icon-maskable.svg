<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c4956a"/>
    </linearGradient>
  </defs>
  <!-- Background fills entire icon (no rounded corners - mask handles shape) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- { } braces - scaled down and centered in safe zone -->
  <text x="256" y="275" text-anchor="middle" font-family="monospace" font-size="144" font-weight="bold" fill="#1e1e1e" opacity="0.85">{ }</text>
  <!-- HA badge - moved inward to stay in safe zone -->
  <rect x="320" y="320" width="100" height="100" rx="24" fill="#18bcf2"/>
  <!-- HA house icon - adjusted position -->
  <path d="M370 350 L345 367 L345 400 L365 400 L365 385 L375 385 L375 400 L395 400 L395 367 Z" fill="white"/>
</svg>
