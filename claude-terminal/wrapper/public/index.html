<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1e1e" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
    <title>Claude Terminal Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            touch-action: manipulation;
            overscroll-behavior: none;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            height: var(--app-height, 100vh);
        }

        #container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: var(--app-height, 100vh);
        }

        #header {
            background: #2d2d2d;
            padding: 8px 12px;
            border-bottom: 1px solid #3d3d3d;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .header-btn {
            background: #007acc;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn:hover {
            background: #005a9e;
        }

        .header-btn:active {
            background: #004578;
        }

        .header-btn:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #voice-btn.recording {
            background: #d9534f;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        #status {
            font-size: 12px;
            color: #888;
            padding: 0 12px;
            transition: all 0.2s ease;
        }

        #status.success {
            color: #4ec9b0;
        }

        #status.error {
            color: #f48771;
        }

        #status:hover {
            opacity: 0.8;
        }

        #status[style*="cursor: pointer"] {
            user-select: all;
        }

        #terminal-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #terminal-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #1e1e1e;
            touch-action: auto;
        }

        /* Touch scroll overlay — captures touch events on iOS where
           iframes don't forward them. Always active on touch devices.
           Swipes are converted to terminal scroll. Taps trigger focus
           on xterm's hidden textarea to open the iOS keyboard. */
        #touch-scroll-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            touch-action: none;
        }

        @media (pointer: coarse) {
            #touch-scroll-overlay {
                display: block;
            }
        }

        #drop-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 122, 204, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
        }

        #drop-zone.active {
            display: flex;
        }

        #drop-zone-text {
            font-size: 24px;
            font-weight: 500;
            color: white;
            text-align: center;
        }

        #file-input {
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Voice Modal */
        #voice-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        #voice-modal.active {
            display: flex;
        }

        #voice-modal-content {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #3d3d3d;
        }

        #voice-modal-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #fff;
        }

        #voice-transcript {
            background: #1e1e1e;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            padding: 12px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
            color: #ccc;
            font-size: 14px;
            line-height: 1.5;
        }

        #voice-transcript.listening {
            border-color: #d9534f;
        }

        #voice-transcript:empty::before {
            content: "Click 'Start Recording' and speak...";
            color: #666;
            font-style: italic;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        .modal-btn-primary {
            background: #007acc;
            color: white;
        }

        .modal-btn-primary:hover {
            background: #005a9e;
        }

        .modal-btn-danger {
            background: #d9534f;
            color: white;
        }

        .modal-btn-danger:hover {
            background: #c9302c;
        }

        .modal-btn-secondary {
            background: #555;
            color: white;
        }

        .modal-btn-secondary:hover {
            background: #666;
        }

        #voice-status {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
            min-height: 18px;
        }

        #voice-status.listening {
            color: #d9534f;
        }

        /* Terminal Control Buttons */
        .ctrl-btn {
            background: #3d3d3d;
            color: #ccc;
            border: 1px solid #555;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'SF Mono', 'Consolas', 'Liberation Mono', monospace;
            min-width: 32px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .ctrl-btn:hover {
            background: #4d4d4d;
            border-color: #666;
        }

        .ctrl-btn:active {
            background: #007acc;
            border-color: #007acc;
            color: white;
        }

        .ctrl-btn.mouse-active {
            background: #007acc;
            border-color: #007acc;
            color: white;
        }

        #paste-input {
            background: #1e1e1e;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 3px;
            padding: 4px 8px;
            font-size: 12px;
            font-family: 'SF Mono', 'Consolas', 'Liberation Mono', monospace;
            flex: 1;
            min-width: 80px;
        }

        #paste-input::placeholder {
            color: #666;
        }

        #paste-input:focus {
            outline: none;
            border-color: #007acc;
        }

        #send-btn {
            background: #007acc;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
        }

        #send-btn:hover {
            background: #005a9e;
        }

        #send-btn:active {
            background: #004578;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <!-- Terminal control buttons -->
            <button class="ctrl-btn" data-input="\x03" title="Ctrl+C (Interrupt)">^C</button>
            <button class="ctrl-btn" data-input="\x09" title="Tab (Autocomplete)">Tab</button>
            <button class="ctrl-btn" data-input="\x1b" title="Escape">Esc</button>
            <button class="ctrl-btn" data-input="\x1b[D" title="Left Arrow">&larr;</button>
            <button class="ctrl-btn" data-input="\x1b[A" title="Up Arrow">&uarr;</button>
            <button class="ctrl-btn" data-input="\x1b[B" title="Down Arrow">&darr;</button>
            <button class="ctrl-btn" data-input="\x1b[C" title="Right Arrow">&rarr;</button>
            <button class="ctrl-btn" data-input="\r" title="Enter / Return">Enter</button>
            <button class="ctrl-btn" id="mouse-toggle" title="Toggle mouse mode: OFF = select text, ON = scroll history">&#x1f5b1; Select</button>

            <!-- Paste input bar -->
            <input type="text" id="paste-input" placeholder="Type or paste here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="send">
            <button id="send-btn" title="Send to terminal">&#9166;</button>

            <!-- Status and existing buttons -->
            <span id="term-indicator" style="width: 8px; height: 8px; border-radius: 50%; background: #f48771; flex-shrink: 0;" title="Terminal loading..."></span>
            <span id="status"></span>
            <button id="voice-btn" class="header-btn" title="Voice Input">
                <span>&#127908;</span>
            </button>
            <button id="upload-btn" class="header-btn" title="Upload Image">
                <span>&#128206;</span>
            </button>
        </div>
        <div id="terminal-container">
            <iframe id="terminal-frame" src="about:blank"></iframe>
            <div id="touch-scroll-overlay"></div>
            <div id="drop-zone">
                <div id="drop-zone-text">Drop image here to upload</div>
            </div>
        </div>
    </div>
    <input type="file" id="file-input" accept="image/*">

    <!-- Voice Input Modal -->
    <div id="voice-modal">
        <div id="voice-modal-content">
            <div id="voice-modal-title">🎤 Voice Input</div>
            <div id="voice-status"></div>
            <div id="voice-transcript" contenteditable="true"></div>
            <div class="modal-buttons">
                <button id="voice-record-btn" class="modal-btn modal-btn-danger">Start Recording</button>
                <button id="voice-send-btn" class="modal-btn modal-btn-primary" style="display: none;">Send to Terminal</button>
                <button id="voice-copy-btn" class="modal-btn modal-btn-secondary" style="display: none;">Copy Text</button>
                <button id="voice-close-btn" class="modal-btn modal-btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script>
        let ttydPort = 7681;
        let uploadDir = '/data/images';

        // Fetch configuration and load ttyd
        // Use relative paths for Home Assistant ingress compatibility
        fetch('config')
            .then(res => res.json())
            .then(config => {
                ttydPort = config.ttydPort;
                uploadDir = config.uploadDir;
                console.log('Config loaded:', config);
                // Load ttyd via proxy endpoint
                loadTerminal();
            })
            .catch(err => {
                console.error('Failed to load config:', err);
                // Fallback: load terminal anyway
                loadTerminal();
            });

        function loadTerminal() {
            const iframe = document.getElementById('terminal-frame');
            // Use relative path for Home Assistant ingress compatibility
            iframe.src = 'terminal/';

            // Poll for xterm.js term instance to be ready in the iframe
            iframe.addEventListener('load', () => {
                const checkTerm = setInterval(() => {
                    try {
                        if (iframe.contentWindow?.term) {
                            clearInterval(checkTerm);
                            const indicator = document.getElementById('term-indicator');
                            indicator.style.background = '#4ec9b0';
                            indicator.title = 'Terminal ready';
                        }
                    } catch (e) {
                        // iframe not accessible yet
                    }
                }, 500);
                // Stop polling after 30s
                setTimeout(() => clearInterval(checkTerm), 30000);
            });
        }

        // ========================================
        // Terminal Input via iframe term API
        // ========================================

        // Send raw input to the terminal via the iframe's xterm.js instance.
        // Uses triggerDataEvent(data, false) to bypass bracket paste mode,
        // so control characters like \x03 (Ctrl+C) are sent raw.
        function sendInput(data) {
            const iframe = document.getElementById('terminal-frame');
            try {
                const term = iframe.contentWindow?.term;
                if (!term) {
                    setStatus('Terminal loading...', 'error');
                    return false;
                }
                term._core.coreService.triggerDataEvent(data, false);
                return true;
            } catch (e) {
                console.error('sendInput failed:', e);
                setStatus('Cannot send to terminal', 'error');
                return false;
            }
        }

        // Auto-inject text into terminal, with clipboard fallback
        function injectIntoTerminal(text) {
            if (sendInput(text)) {
                setStatus('Sent to terminal: ' + text, 'success');
                return true;
            }
            return false;
        }

        // ========================================
        // Control Buttons
        // ========================================

        const INPUT_MAP = {
            '\\x03': '\x03',  // Ctrl+C
            '\\x09': '\x09',  // Tab
            '\\x1b': '\x1b',  // Escape
            '\\x1b[A': '\x1b[A',  // Up
            '\\x1b[B': '\x1b[B',  // Down
            '\\x1b[C': '\x1b[C',  // Right
            '\\x1b[D': '\x1b[D',  // Left
            '\\r': '\r',          // Enter
        };

        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                const rawInput = btn.getAttribute('data-input');
                const input = INPUT_MAP[rawInput];
                if (input) {
                    sendInput(input);
                }
            });
        });

        // ========================================
        // Mouse Mode Toggle
        // ========================================

        const mouseToggle = document.getElementById('mouse-toggle');
        let mouseMode = false; // Start assuming off, will sync on load

        async function syncMouseMode() {
            try {
                const res = await fetch('mouse-mode');
                const data = await res.json();
                mouseMode = data.enabled;
                updateMouseButton();
            } catch (e) {
                console.log('Could not sync mouse mode:', e);
            }
        }

        function updateMouseButton() {
            if (mouseMode) {
                mouseToggle.textContent = '\u{1F5B1} Scroll';
                mouseToggle.title = 'Mouse mode: ON (scroll history) — click to switch to text selection';
                mouseToggle.classList.add('mouse-active');
            } else {
                mouseToggle.textContent = '\u{1F5B1} Select';
                mouseToggle.title = 'Mouse mode: OFF (select text) — click to switch to scroll history';
                mouseToggle.classList.remove('mouse-active');
            }
        }

        mouseToggle.addEventListener('pointerdown', async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('mouse-mode', { method: 'POST' });
                const data = await res.json();
                mouseMode = data.enabled;
                updateMouseButton();
                setStatus(mouseMode ? 'Mouse: scroll mode (select text disabled)' : 'Mouse: select mode (scroll with Ctrl+B, [)', 'success');
            } catch (err) {
                setStatus('Failed to toggle mouse mode', 'error');
            }
        });

        // Sync initial state after terminal loads
        syncMouseMode();

        // Paste input bar
        const pasteInput = document.getElementById('paste-input');
        const sendBtn = document.getElementById('send-btn');

        function sendPasteInput() {
            const text = pasteInput.value;
            if (text) {
                sendInput(text);
                pasteInput.value = '';
            }
        }

        sendBtn.addEventListener('click', (e) => {
            e.preventDefault();
            sendPasteInput();
        });

        pasteInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendPasteInput();
            }
        });

        const status = document.getElementById('status');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        function setStatus(message, type = '', persistent = false) {
            status.textContent = message;
            status.className = type;
            if (message && !persistent) {
                setTimeout(() => setStatus(''), 5000);
            }
        }

        async function uploadImage(file) {
            if (!file || !file.type.startsWith('image/')) {
                setStatus('Please select an image file', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            uploadBtn.innerHTML = '<span class="spinner"></span><span>Uploading...</span>';
            uploadBtn.disabled = true;

            try {
                // Use relative path for Home Assistant ingress compatibility
                const response = await fetch('upload', {
                    method: 'POST',
                    body: formData
                });

                // Check if response is ok (status 200-299)
                if (!response.ok) {
                    const text = await response.text();
                    let errorMessage = 'Upload failed';
                    try {
                        const errorJson = JSON.parse(text);
                        errorMessage = errorJson.error || errorMessage;
                    } catch {
                        errorMessage = text || errorMessage;
                    }
                    throw new Error(errorMessage);
                }

                const result = await response.json();

                if (result.success) {
                    const filePath = result.path;
                    console.log('Image uploaded:', filePath);

                    // Try injecting path directly into terminal, fall back to clipboard
                    if (!injectIntoTerminal(filePath)) {
                        const copied = await copyToClipboard(filePath);
                        if (copied) {
                            setStatus('Copied path: ' + filePath + ' — paste in terminal', 'success');
                        } else {
                            setStatus('Path: ' + filePath, 'success', true);
                        }
                    }
                } else {
                    setStatus(result.error || 'Upload failed', 'error');
                }
            } catch (error) {
                console.error('Upload error:', error);
                setStatus('Upload failed: ' + error.message, 'error');
            } finally {
                uploadBtn.innerHTML = '<span>📎</span><span>Upload Image</span>';
                uploadBtn.disabled = false;
            }
        }

        // Upload button click
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadImage(e.target.files[0]);
            }
        });

        // Paste handling
        document.addEventListener('paste', async (e) => {
            console.log('Paste event detected');
            const items = e.clipboardData?.items;

            if (!items) {
                console.log('No clipboard items found');
                return;
            }

            console.log('Clipboard items:', Array.from(items).map(i => i.type));

            for (let item of items) {
                if (item.type.startsWith('image/')) {
                    console.log('Image found in clipboard:', item.type);
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (file) {
                        console.log('File extracted from clipboard:', file.name, file.size);
                        await uploadImage(file);
                    } else {
                        console.error('Failed to extract file from clipboard item');
                    }
                    break;
                }
            }
        });

        // Also handle paste on window for better compatibility
        window.addEventListener('paste', async (e) => {
            // This ensures paste works even when iframe has focus
            console.log('Window paste event detected');
        });

        // Drag and drop handling
        let dragCounter = 0;

        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            if (dragCounter === 1) {
                dropZone.classList.add('active');
            }
        });

        document.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) {
                dropZone.classList.remove('active');
            }
        });

        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.addEventListener('drop', async (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropZone.classList.remove('active');

            const files = e.dataTransfer?.files;
            if (files && files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    await uploadImage(file);
                } else {
                    setStatus('Please drop an image file', 'error');
                }
            }
        });

        // Helper to copy text to clipboard
        async function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (err) {
                    console.log('Clipboard API failed, trying fallback:', err);
                    return fallbackCopyToClipboard(text);
                }
            } else {
                return fallbackCopyToClipboard(text);
            }
        }

        // Fallback clipboard copy using execCommand
        function fallbackCopyToClipboard(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'absolute';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.select();

            try {
                const copied = document.execCommand('copy');
                document.body.removeChild(textArea);
                return copied;
            } catch (err) {
                document.body.removeChild(textArea);
                return false;
            }
        }

        // Prevent default drag behavior on iframe
        window.addEventListener('load', () => {
            const iframe = document.getElementById('terminal-frame');
            iframe.addEventListener('dragover', (e) => e.preventDefault());
            iframe.addEventListener('drop', (e) => e.preventDefault());
        });

        // ========================================
        // iOS Touch-to-Scroll for Terminal
        // ========================================
        // iOS doesn't deliver touch events to iframes in PWA standalone mode.
        // The overlay is always active on touch devices (pointer-events: auto
        // via display:block). It captures all touches in the terminal area:
        //   - Vertical swipes → scroll the terminal via WheelEvent + scrollLines
        //   - Taps → focus xterm's hidden textarea to open iOS keyboard
        // iOS keyboard requires focus() on a real input element from a user
        // gesture handler — the overlay's touchend qualifies as a user gesture.

        (function() {
            const overlay = document.getElementById('touch-scroll-overlay');
            if (!overlay) return;

            let startY = 0;
            let startX = 0;
            let lastY = 0;
            let isSwiping = false;
            let touchStartTime = 0;
            const SWIPE_THRESHOLD = 10;
            const LINE_HEIGHT = 20;

            overlay.addEventListener('touchstart', (e) => {
                startY = lastY = e.touches[0].clientY;
                startX = e.touches[0].clientX;
                isSwiping = false;
                touchStartTime = Date.now();
            }, { passive: true });

            overlay.addEventListener('touchmove', (e) => {
                const currentY = e.touches[0].clientY;
                const currentX = e.touches[0].clientX;
                const totalDeltaY = Math.abs(currentY - startY);
                const totalDeltaX = Math.abs(currentX - startX);

                // Only handle vertical swipes
                if (!isSwiping && totalDeltaY > SWIPE_THRESHOLD && totalDeltaY > totalDeltaX) {
                    isSwiping = true;
                }

                if (!isSwiping) return;

                e.preventDefault();

                const deltaY = lastY - currentY;
                lastY = currentY;

                const lines = Math.round(deltaY / LINE_HEIGHT);
                if (lines === 0) return;

                const iframe = document.getElementById('terminal-frame');
                try {
                    const term = iframe.contentWindow?.term;
                    if (!term) return;

                    // Dispatch wheel event on xterm viewport (works with tmux mouse mode)
                    const xtermViewport = iframe.contentDocument?.querySelector('.xterm-viewport');
                    if (xtermViewport) {
                        xtermViewport.dispatchEvent(new WheelEvent('wheel', {
                            deltaY: lines * LINE_HEIGHT,
                            deltaMode: 0,
                            bubbles: true,
                            cancelable: true
                        }));
                    }

                    // Also scroll xterm.js buffer directly (fallback for mouse mode off)
                    term.scrollLines(lines);
                } catch (err) {
                    // Cross-origin or term not ready
                }
            }, { passive: false });

            overlay.addEventListener('touchend', (e) => {
                if (isSwiping) return; // Was a scroll, not a tap

                const elapsed = Date.now() - touchStartTime;
                if (elapsed > 300) return; // Long press, not a tap

                // Tap detected — focus xterm's hidden textarea to open keyboard.
                // This runs inside a user gesture handler (touchend on overlay),
                // so iOS treats the focus() call as user-initiated and opens the keyboard.
                const iframe = document.getElementById('terminal-frame');
                try {
                    const xtermTextarea = iframe.contentDocument?.querySelector('.xterm-helper-textarea');
                    if (xtermTextarea) {
                        xtermTextarea.focus();
                    } else {
                        // Fallback: focus the iframe itself
                        iframe.focus();
                    }
                } catch (err) {
                    iframe.focus();
                }
            });
        })();

        // ========================================
        // iOS Virtual Keyboard Height Fix
        // ========================================
        // iOS doesn't resize the layout viewport when the keyboard opens —
        // 100vh still equals full screen height, hiding the terminal bottom.
        // Use the Visual Viewport API to set a CSS custom property (--app-height)
        // that tracks the actual visible height.

        (function() {
            const vv = window.visualViewport;
            if (!vv) return; // Not supported, 100vh fallback works fine

            function updateHeight() {
                document.documentElement.style.setProperty('--app-height', vv.height + 'px');
            }

            vv.addEventListener('resize', updateHeight);
            // Set initial value
            updateHeight();
        })();

        // ========================================
        // Voice Input with Web Speech API
        // ========================================

        const voiceBtn = document.getElementById('voice-btn');
        const voiceModal = document.getElementById('voice-modal');
        const voiceRecordBtn = document.getElementById('voice-record-btn');
        const voiceCopyBtn = document.getElementById('voice-copy-btn');
        const voiceSendBtn = document.getElementById('voice-send-btn');
        const voiceCloseBtn = document.getElementById('voice-close-btn');
        const voiceTranscript = document.getElementById('voice-transcript');
        const voiceStatus = document.getElementById('voice-status');

        let recognition = null;
        let isRecording = false;

        // Check if Web Speech API is supported
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();

            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US'; // Default to English, can be made configurable

            console.log('Web Speech API is supported!');
        } else {
            console.warn('Web Speech API is not supported in this browser');
            voiceBtn.disabled = true;
            voiceBtn.title = 'Voice input not supported in this browser';
        }

        // Open voice modal
        voiceBtn.addEventListener('click', () => {
            voiceModal.classList.add('active');
            voiceTranscript.textContent = '';
            voiceStatus.textContent = '';
            voiceCopyBtn.style.display = 'none';
            voiceSendBtn.style.display = 'none';
        });

        // Close voice modal
        voiceCloseBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            }
            voiceModal.classList.remove('active');
        });

        // Click outside modal to close
        voiceModal.addEventListener('click', (e) => {
            if (e.target === voiceModal) {
                if (isRecording) {
                    stopRecording();
                }
                voiceModal.classList.remove('active');
            }
        });

        // Start/Stop recording
        voiceRecordBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        function startRecording() {
            if (!recognition) {
                voiceStatus.textContent = '❌ Speech recognition not available';
                voiceStatus.className = 'error';
                return;
            }

            isRecording = true;
            voiceRecordBtn.textContent = 'Stop Recording';
            voiceRecordBtn.className = 'modal-btn modal-btn-danger';
            voiceStatus.textContent = '🎤 Listening... (speak now)';
            voiceStatus.classList.add('listening');
            voiceTranscript.classList.add('listening');

            let finalTranscript = '';
            let interimTranscript = '';

            recognition.onresult = (event) => {
                interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;

                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                // Display both final and interim results
                voiceTranscript.textContent = finalTranscript + interimTranscript;

                // Auto-scroll to bottom
                voiceTranscript.scrollTop = voiceTranscript.scrollHeight;
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                let errorMessage = 'Error: ';

                switch(event.error) {
                    case 'no-speech':
                        errorMessage += 'No speech detected. Try speaking again.';
                        break;
                    case 'audio-capture':
                        errorMessage += 'No microphone found. Check your settings.';
                        break;
                    case 'not-allowed':
                        errorMessage += 'Microphone access denied. Please allow access.';
                        break;
                    default:
                        errorMessage += event.error;
                }

                voiceStatus.textContent = '❌ ' + errorMessage;
                voiceStatus.classList.remove('listening');
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    // Restart if it stops but we're still recording
                    recognition.start();
                }
            };

            try {
                recognition.start();
                console.log('Speech recognition started');
            } catch (err) {
                console.error('Failed to start recognition:', err);
                voiceStatus.textContent = '❌ Failed to start recording';
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!recognition) return;

            isRecording = false;
            recognition.stop();

            voiceRecordBtn.textContent = 'Start Recording';
            voiceRecordBtn.className = 'modal-btn modal-btn-primary';
            voiceStatus.textContent = '✓ Recording stopped';
            voiceStatus.classList.remove('listening');
            voiceTranscript.classList.remove('listening');

            if (voiceTranscript.textContent.trim()) {
                voiceSendBtn.style.display = 'inline-block';
                voiceCopyBtn.style.display = 'inline-block';
                voiceStatus.textContent = 'Transcript ready! Edit if needed, then send or copy.';
            }

            console.log('Speech recognition stopped');
        }

        // Send transcript to terminal
        voiceSendBtn.addEventListener('click', () => {
            const text = voiceTranscript.textContent.trim();
            if (!text) {
                voiceStatus.textContent = 'No text to send';
                return;
            }
            if (sendInput(text)) {
                voiceStatus.textContent = 'Sent to terminal!';
                voiceStatus.className = 'success';
            } else {
                voiceStatus.textContent = 'Terminal not ready. Use Copy Text instead.';
            }
        });

        // Copy transcript to clipboard
        voiceCopyBtn.addEventListener('click', async () => {
            const text = voiceTranscript.textContent.trim();

            if (!text) {
                voiceStatus.textContent = '❌ No text to copy';
                return;
            }

            // Try clipboard API first
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(text);
                    voiceStatus.textContent = '✓ Copied to clipboard! Paste into terminal.';
                    voiceStatus.className = 'success';
                } catch (err) {
                    fallbackCopy(text);
                }
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            // Fallback using execCommand
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = text;
            tempTextArea.style.position = 'absolute';
            tempTextArea.style.left = '-9999px';
            document.body.appendChild(tempTextArea);

            tempTextArea.select();

            try {
                const copied = document.execCommand('copy');
                if (copied) {
                    voiceStatus.textContent = '✓ Copied! Paste into terminal.';
                    voiceStatus.className = 'success';
                } else {
                    voiceStatus.textContent = '⚠️ Select text above and press Cmd+C to copy';
                }
            } catch (err) {
                voiceStatus.textContent = '⚠️ Select text above and press Cmd+C to copy';
            }

            document.body.removeChild(tempTextArea);
        }

        // Keyboard shortcuts in voice modal
        voiceModal.addEventListener('keydown', (e) => {
            // Escape to close
            if (e.key === 'Escape') {
                if (isRecording) {
                    stopRecording();
                }
                voiceModal.classList.remove('active');
            }

            // Enter to send to terminal (if text exists and not recording)
            if (e.key === 'Enter' && !isRecording && voiceTranscript.textContent.trim()) {
                voiceSendBtn.click();
            }

            // Space to start/stop recording (if not editing transcript)
            if (e.key === ' ' && e.target !== voiceTranscript) {
                e.preventDefault();
                voiceRecordBtn.click();
            }
        });

        console.log('Voice input module loaded');
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registered, scope:', reg.scope))
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>
</body>
</html>
