<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude HA — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            text-align: center;
            max-width: 400px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        h1 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 500;
        }

        p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #888;
        }

        .retry-btn {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .retry-btn:hover {
            background: #005a9e;
        }

        .retry-btn:active {
            background: #004578;
        }

        @media (prefers-color-scheme: light) {
            body { background: #f5f5f5; color: #333; }
            h1 { color: #111; }
            p { color: #666; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">{ }</div>
        <h1>You're offline</h1>
        <p>Claude Terminal requires a live connection to your Home Assistant server. Check your network and try again.</p>
        <button class="retry-btn" onclick="location.reload()">Retry Connection</button>
    </div>
</body>
</html>
