---
name: "Claude Terminal Prowine"
description: "Enhanced terminal interface for Anthropic's Claude Code CLI with persistent auth, package management, and image paste support"
version: "2.6.3" # x-release-please-version
slug: "claude_terminal_prowine"
image: "ghcr.io/owine/claude-terminal-prowine"
init: false

# Supported architectures
arch:
  - aarch64
  - amd64

# External resources
url: "https://github.com/owine/claude-terminal-home-assistant"

# Web interface configuration
ingress: true
ingress_port: 7680
panel_icon: mdi:code-braces-box
panel_title: "Claude Terminal Prowine"
panel_admin: true

# Port configuration
ports:
  7680/tcp: 7680
  7681/tcp: null
ports_description:
  7680/tcp: "Image upload service and web interface"
  7681/tcp: "ttyd terminal (not required, access via ingress on port 7680)"

# App configuration options
options:
  auto_launch_claude: true
  dangerously_skip_permissions: false
  enable_ha_mcp: true
  # tmux_mouse_mode: Enable mouse support in tmux
  #   When true: Mouse wheel scrolling works, but hold Shift to select text
  #   When false: Normal text selection works, but no mouse scrolling (default)
  tmux_mouse_mode: false
  # persist_npm_cache: Keep the npm cache in persistent /data storage
  #   When false: cache lives in ephemeral /tmp, wiped on restart and kept out
  #     of HA backups (default) - the ~3 GB cache no longer bloats backups
  #   When true: cache persists at /data/home/.npm across restarts (legacy
  #     behavior); useful on slow connections to avoid re-downloading packages
  persist_npm_cache: false
  persistent_apk_packages: []
  persistent_pip_packages: []
  enable_docker: false
  enable_docker_buildx: false

schema:
  auto_launch_claude: bool?
  dangerously_skip_permissions: bool?
  enable_ha_mcp: bool?
  tmux_mouse_mode: bool?
  persist_npm_cache: bool?
  persistent_apk_packages:
    - str?
  persistent_pip_packages:
    - str?
  enable_docker: bool?
  enable_docker_buildx: bool?

# Volume mappings for file access
map:
  # path: /config keeps HA's config dir at today's mount (drop-in for legacy "config:rw")
  - type: homeassistant_config
    read_only: false
    path: /config
  # all_addon_configs exposes every add-on's config dir at /addon_configs/<repo>_<slug>/
  # (HA default mount). Always-on read-write; see DOCS.md "Add-on Config Access".
  - type: all_addon_configs
    read_only: false

# API access for Home Assistant integration
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true
# Docker socket access (inert while Protection Mode is ON).
# Lets the terminal talk to the host Docker daemon when the user disables
# Protection Mode AND sets enable_docker: true. See DOCS.md "Docker Access".
docker_api: true

# Service startup configuration
startup: services

# Web UI access URL
webui: http://[HOST]:[PORT:7680]/
