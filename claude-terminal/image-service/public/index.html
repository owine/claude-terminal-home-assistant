<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Terminal Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        #container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #header {
            background: #2d2d2d;
            padding: 8px 12px;
            border-bottom: 1px solid #3d3d3d;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .header-btn {
            background: #007acc;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn:hover {
            background: #005a9e;
        }

        .header-btn:active {
            background: #004578;
        }

        .header-btn:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        #voice-btn.recording {
            background: #d9534f;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        #status {
            font-size: 12px;
            color: #888;
            padding: 0 12px;
            transition: all 0.2s ease;
        }

        #status.success {
            color: #4ec9b0;
        }

        #status.error {
            color: #f48771;
        }

        #status:hover {
            opacity: 0.8;
        }

        #status[style*="cursor: pointer"] {
            user-select: all;
        }

        #terminal-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #terminal-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #1e1e1e;
        }

        #drop-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 122, 204, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
        }

        #drop-zone.active {
            display: flex;
        }

        #drop-zone-text {
            font-size: 24px;
            font-weight: 500;
            color: white;
            text-align: center;
        }

        #file-input {
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Voice Modal */
        #voice-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        #voice-modal.active {
            display: flex;
        }

        #voice-modal-content {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #3d3d3d;
        }

        #voice-modal-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #fff;
        }

        #voice-transcript {
            background: #1e1e1e;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            padding: 12px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
            color: #ccc;
            font-size: 14px;
            line-height: 1.5;
        }

        #voice-transcript.listening {
            border-color: #d9534f;
        }

        #voice-transcript:empty::before {
            content: "Click 'Start Recording' and speak...";
            color: #666;
            font-style: italic;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        .modal-btn-primary {
            background: #007acc;
            color: white;
        }

        .modal-btn-primary:hover {
            background: #005a9e;
        }

        .modal-btn-danger {
            background: #d9534f;
            color: white;
        }

        .modal-btn-danger:hover {
            background: #c9302c;
        }

        .modal-btn-secondary {
            background: #555;
            color: white;
        }

        .modal-btn-secondary:hover {
            background: #666;
        }

        #voice-status {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
            min-height: 18px;
        }

        #voice-status.listening {
            color: #d9534f;
        }

        /* Terminal Control Buttons */
        .ctrl-btn {
            background: #3d3d3d;
            color: #ccc;
            border: 1px solid #555;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'SF Mono', 'Consolas', 'Liberation Mono', monospace;
            min-width: 32px;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .ctrl-btn:hover {
            background: #4d4d4d;
            border-color: #666;
        }

        .ctrl-btn:active {
            background: #007acc;
            border-color: #007acc;
            color: white;
        }

        #paste-input {
            background: #1e1e1e;
            color: #ccc;
            border: 1px solid #555;
            border-radius: 3px;
            padding: 4px 8px;
            font-size: 12px;
            font-family: 'SF Mono', 'Consolas', 'Liberation Mono', monospace;
            flex: 1;
            min-width: 80px;
        }

        #paste-input::placeholder {
            color: #666;
        }

        #paste-input:focus {
            outline: none;
            border-color: #007acc;
        }

        #send-btn {
            background: #007acc;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
        }

        #send-btn:hover {
            background: #005a9e;
        }

        #send-btn:active {
            background: #004578;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <!-- Terminal control buttons -->
            <button class="ctrl-btn" data-input="\x03" title="Ctrl+C (Interrupt)">^C</button>
            <button class="ctrl-btn" data-input="\x04" title="Ctrl+D (EOF)">^D</button>
            <button class="ctrl-btn" data-input="\x1a" title="Ctrl+Z (Suspend)">^Z</button>
            <button class="ctrl-btn" data-input="\x09" title="Tab (Autocomplete)">Tab</button>
            <button class="ctrl-btn" data-input="\x1b" title="Escape">Esc</button>
            <button class="ctrl-btn" data-input="\x1b[D" title="Left Arrow">&larr;</button>
            <button class="ctrl-btn" data-input="\x1b[A" title="Up Arrow">&uarr;</button>
            <button class="ctrl-btn" data-input="\x1b[B" title="Down Arrow">&darr;</button>
            <button class="ctrl-btn" data-input="\x1b[C" title="Right Arrow">&rarr;</button>

            <!-- Paste input bar -->
            <input type="text" id="paste-input" enterkeyhint="send" placeholder="Type or paste here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button id="send-btn" title="Send to terminal">&#9166;</button>

            <!-- Connection indicator and status -->
            <span id="ws-indicator" style="width: 8px; height: 8px; border-radius: 50%; background: #f48771; flex-shrink: 0;" title="Terminal input disconnected"></span>
            <span id="status"></span>
            <button id="voice-btn" class="header-btn" title="Voice Input">
                <span>&#127908;</span>
            </button>
            <button id="upload-btn" class="header-btn" title="Upload Image">
                <span>&#128206;</span>
            </button>
        </div>
        <div id="terminal-container">
            <iframe id="terminal-frame" src="about:blank"></iframe>
            <div id="drop-zone">
                <div id="drop-zone-text">Drop image here to upload</div>
            </div>
        </div>
    </div>
    <input type="file" id="file-input" accept="image/*">

    <!-- Voice Input Modal -->
    <div id="voice-modal">
        <div id="voice-modal-content">
            <div id="voice-modal-title">🎤 Voice Input</div>
            <div id="voice-status"></div>
            <div id="voice-transcript" contenteditable="true"></div>
            <div class="modal-buttons">
                <button id="voice-record-btn" class="modal-btn modal-btn-danger">Start Recording</button>
                <button id="voice-send-btn" class="modal-btn modal-btn-primary" style="display: none;">Send to Terminal</button>
                <button id="voice-copy-btn" class="modal-btn modal-btn-secondary" style="display: none;">Copy Text</button>
                <button id="voice-close-btn" class="modal-btn modal-btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script>
        let ttydPort = 7681;
        let uploadDir = '/data/images';

        // Fetch configuration and load ttyd
        // Use relative paths for Home Assistant ingress compatibility
        fetch('config')
            .then(res => res.json())
            .then(config => {
                ttydPort = config.ttydPort;
                uploadDir = config.uploadDir;
                console.log('Config loaded:', config);
                // Load ttyd via proxy endpoint
                loadTerminal();
            })
            .catch(err => {
                console.error('Failed to load config:', err);
                // Fallback: load terminal anyway
                loadTerminal();
            });

        function loadTerminal() {
            const iframe = document.getElementById('terminal-frame');
            // Use relative path for Home Assistant ingress compatibility
            iframe.src = 'terminal/';
        }

        // ========================================
        // Terminal Control WebSocket
        // ========================================

        let controlWs = null;
        let wsReconnectDelay = 1000;
        let wsReconnectTimer = null;
        const WS_MAX_RECONNECT_DELAY = 30000;

        function connectControlWebSocket() {
            // Build WebSocket URL relative to current page (works with HA ingress)
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const basePath = location.pathname.endsWith('/') ? location.pathname : location.pathname + '/';
            const wsUrl = `${protocol}//${location.host}${basePath}terminal/ws`;

            console.log('Control WebSocket connecting to:', wsUrl);
            controlWs = new WebSocket(wsUrl);

            controlWs.onopen = () => {
                console.log('Control WebSocket connected');
                wsReconnectDelay = 1000;
                updateWsIndicator(true);
            };

            controlWs.onmessage = (event) => {
                // ttyd protocol: first char is message type
                // '0' = output (ignore, iframe handles display)
                // '1' = set window title (ignore)
                // '2' = set preferences (ignore)
                // We must read messages to keep the WebSocket alive,
                // but don't need to process them
                if (typeof event.data === 'string' && event.data.length > 0) {
                    const msgType = event.data[0];
                    // Log first message type for diagnostics
                    if (!controlWs._firstMsg) {
                        console.log('Control WebSocket first message type:', msgType);
                        controlWs._firstMsg = true;
                    }
                }
            };

            controlWs.onclose = (event) => {
                console.log('Control WebSocket closed, code:', event.code, 'reason:', event.reason);
                updateWsIndicator(false);
                wsReconnectTimer = setTimeout(connectControlWebSocket, wsReconnectDelay);
                wsReconnectDelay = Math.min(wsReconnectDelay * 2, WS_MAX_RECONNECT_DELAY);
            };

            controlWs.onerror = (err) => {
                console.error('Control WebSocket error:', err);
                controlWs.close();
            };
        }

        // Visual indicator for WebSocket connection state
        function updateWsIndicator(connected) {
            const indicator = document.getElementById('ws-indicator');
            if (indicator) {
                indicator.style.background = connected ? '#4ec9b0' : '#f48771';
                indicator.title = connected ? 'Terminal input connected' : 'Terminal input disconnected';
            }
        }

        function sendInput(data) {
            if (controlWs && controlWs.readyState === WebSocket.OPEN) {
                // ttyd protocol: '0' prefix = client input
                controlWs.send('0' + data);
                console.log('Sent input:', JSON.stringify(data));
            } else {
                console.warn('Control WebSocket not open, state:', controlWs?.readyState);
                setStatus('Terminal not connected', 'error');
            }
        }

        // Auto-inject text into terminal via WebSocket, with clipboard fallback
        function injectIntoTerminal(text) {
            if (controlWs && controlWs.readyState === WebSocket.OPEN) {
                sendInput(text);
                setStatus('Sent to terminal: ' + text, 'success');
                return true;
            }
            return false;
        }

        // Connect after a short delay to let ttyd start
        setTimeout(connectControlWebSocket, 1000);

        // Pause reconnection when tab is hidden; reconnect when visible
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (wsReconnectTimer) {
                    clearTimeout(wsReconnectTimer);
                    wsReconnectTimer = null;
                }
                if (controlWs) controlWs.close();
            } else {
                if (!controlWs || controlWs.readyState !== WebSocket.OPEN) {
                    connectControlWebSocket();
                }
            }
        });

        const status = document.getElementById('status');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        function setStatus(message, type = '', persistent = false) {
            status.textContent = message;
            status.className = type;
            if (message && !persistent) {
                setTimeout(() => setStatus(''), 5000);
            }
        }

        async function uploadImage(file) {
            if (!file || !file.type.startsWith('image/')) {
                setStatus('Please select an image file', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            uploadBtn.innerHTML = '<span class="spinner"></span>';
            uploadBtn.disabled = true;

            try {
                // Use relative path for Home Assistant ingress compatibility
                const response = await fetch('upload', {
                    method: 'POST',
                    body: formData
                });

                // Check if response is ok (status 200-299)
                if (!response.ok) {
                    const text = await response.text();
                    let errorMessage = 'Upload failed';
                    try {
                        const errorJson = JSON.parse(text);
                        errorMessage = errorJson.error || errorMessage;
                    } catch {
                        errorMessage = text || errorMessage;
                    }
                    throw new Error(errorMessage);
                }

                const result = await response.json();

                if (result.success) {
                    const filePath = result.path;
                    console.log('Image uploaded:', filePath);

                    // Try WebSocket injection first, fall back to clipboard
                    if (!injectIntoTerminal(filePath)) {
                        const copied = await copyToClipboard(filePath);
                        if (copied) {
                            setStatus('Copied path: ' + filePath + ' — paste in terminal', 'success');
                        } else {
                            setStatus('Path: ' + filePath, 'success', true);
                        }
                    }
                } else {
                    setStatus(result.error || 'Upload failed', 'error');
                }
            } catch (error) {
                console.error('Upload error:', error);
                setStatus('Upload failed: ' + error.message, 'error');
            } finally {
                uploadBtn.innerHTML = '<span>&#128206;</span>';
                uploadBtn.disabled = false;
            }
        }

        // Upload button click
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadImage(e.target.files[0]);
            }
        });

        // Paste handling
        document.addEventListener('paste', async (e) => {
            console.log('Paste event detected');
            const items = e.clipboardData?.items;

            if (!items) {
                console.log('No clipboard items found');
                return;
            }

            console.log('Clipboard items:', Array.from(items).map(i => i.type));

            for (let item of items) {
                if (item.type.startsWith('image/')) {
                    console.log('Image found in clipboard:', item.type);
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (file) {
                        console.log('File extracted from clipboard:', file.name, file.size);
                        await uploadImage(file);
                    } else {
                        console.error('Failed to extract file from clipboard item');
                    }
                    break;
                }
            }
        });

        // Also handle paste on window for better compatibility
        window.addEventListener('paste', async (e) => {
            // This ensures paste works even when iframe has focus
            console.log('Window paste event detected');
        });

        // Drag and drop handling
        let dragCounter = 0;

        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            if (dragCounter === 1) {
                dropZone.classList.add('active');
            }
        });

        document.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) {
                dropZone.classList.remove('active');
            }
        });

        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.addEventListener('drop', async (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropZone.classList.remove('active');

            const files = e.dataTransfer?.files;
            if (files && files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    await uploadImage(file);
                } else {
                    setStatus('Please drop an image file', 'error');
                }
            }
        });


        // Helper to copy text to clipboard
        async function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (err) {
                    console.log('Clipboard API failed, trying fallback:', err);
                    return fallbackCopyToClipboard(text);
                }
            } else {
                return fallbackCopyToClipboard(text);
            }
        }

        // Fallback clipboard copy using execCommand
        function fallbackCopyToClipboard(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'absolute';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.select();

            try {
                const copied = document.execCommand('copy');
                document.body.removeChild(textArea);
                return copied;
            } catch (err) {
                document.body.removeChild(textArea);
                return false;
            }
        }

        // Prevent default drag behavior on iframe
        window.addEventListener('load', () => {
            const iframe = document.getElementById('terminal-frame');
            iframe.addEventListener('dragover', (e) => e.preventDefault());
            iframe.addEventListener('drop', (e) => e.preventDefault());
        });

        // ========================================
        // Control Buttons
        // ========================================

        const INPUT_MAP = {
            '\\x03': '\x03',
            '\\x04': '\x04',
            '\\x1a': '\x1a',
            '\\x09': '\x09',
            '\\x1b': '\x1b',
            '\\x1b[A': '\x1b[A',
            '\\x1b[B': '\x1b[B',
            '\\x1b[C': '\x1b[C',
            '\\x1b[D': '\x1b[D',
        };

        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            // Use pointerdown for immediate response on both touch and mouse
            // This avoids the touchstart→click chain issue where preventDefault
            // on touchstart kills the synthetic click event on mobile
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                const rawInput = btn.getAttribute('data-input');
                const input = INPUT_MAP[rawInput];
                if (input) {
                    sendInput(input);
                }
            });
        });

        // Paste input bar
        const pasteInput = document.getElementById('paste-input');
        const sendBtn = document.getElementById('send-btn');

        function sendPasteInput() {
            const text = pasteInput.value;
            if (text) {
                sendInput(text);
                pasteInput.value = '';
            }
        }

        sendBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            sendPasteInput();
        });

        pasteInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendPasteInput();
            }
        });

        // ========================================
        // Voice Input with Web Speech API
        // ========================================

        const voiceBtn = document.getElementById('voice-btn');
        const voiceModal = document.getElementById('voice-modal');
        const voiceRecordBtn = document.getElementById('voice-record-btn');
        const voiceCopyBtn = document.getElementById('voice-copy-btn');
        const voiceCloseBtn = document.getElementById('voice-close-btn');
        const voiceTranscript = document.getElementById('voice-transcript');
        const voiceStatus = document.getElementById('voice-status');

        let recognition = null;
        let isRecording = false;

        // Check if Web Speech API is supported
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();

            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US'; // Default to English, can be made configurable

            console.log('Web Speech API is supported!');
        } else {
            console.warn('Web Speech API is not supported in this browser');
            voiceBtn.disabled = true;
            voiceBtn.title = 'Voice input not supported in this browser';
        }

        // Open voice modal
        voiceBtn.addEventListener('click', () => {
            voiceModal.classList.add('active');
            voiceTranscript.textContent = '';
            voiceStatus.textContent = '';
            voiceCopyBtn.style.display = 'none';
            voiceSendBtn.style.display = 'none';
        });

        // Close voice modal
        voiceCloseBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            }
            voiceModal.classList.remove('active');
        });

        // Click outside modal to close
        voiceModal.addEventListener('click', (e) => {
            if (e.target === voiceModal) {
                if (isRecording) {
                    stopRecording();
                }
                voiceModal.classList.remove('active');
            }
        });

        // Start/Stop recording
        voiceRecordBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        function startRecording() {
            if (!recognition) {
                voiceStatus.textContent = '❌ Speech recognition not available';
                voiceStatus.className = 'error';
                return;
            }

            isRecording = true;
            voiceRecordBtn.textContent = 'Stop Recording';
            voiceRecordBtn.className = 'modal-btn modal-btn-danger';
            voiceStatus.textContent = '🎤 Listening... (speak now)';
            voiceStatus.classList.add('listening');
            voiceTranscript.classList.add('listening');

            let finalTranscript = '';
            let interimTranscript = '';

            recognition.onresult = (event) => {
                interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;

                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                // Display both final and interim results
                voiceTranscript.textContent = finalTranscript + interimTranscript;

                // Auto-scroll to bottom
                voiceTranscript.scrollTop = voiceTranscript.scrollHeight;
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                let errorMessage = 'Error: ';

                switch(event.error) {
                    case 'no-speech':
                        errorMessage += 'No speech detected. Try speaking again.';
                        break;
                    case 'audio-capture':
                        errorMessage += 'No microphone found. Check your settings.';
                        break;
                    case 'not-allowed':
                        errorMessage += 'Microphone access denied. Please allow access.';
                        break;
                    default:
                        errorMessage += event.error;
                }

                voiceStatus.textContent = '❌ ' + errorMessage;
                voiceStatus.classList.remove('listening');
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    // Restart if it stops but we're still recording
                    recognition.start();
                }
            };

            try {
                recognition.start();
                console.log('Speech recognition started');
            } catch (err) {
                console.error('Failed to start recognition:', err);
                voiceStatus.textContent = '❌ Failed to start recording';
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!recognition) return;

            isRecording = false;
            recognition.stop();

            voiceRecordBtn.textContent = 'Start Recording';
            voiceRecordBtn.className = 'modal-btn modal-btn-primary';
            voiceStatus.textContent = '✓ Recording stopped';
            voiceStatus.classList.remove('listening');
            voiceTranscript.classList.remove('listening');

            if (voiceTranscript.textContent.trim()) {
                voiceCopyBtn.style.display = 'inline-block';
                voiceSendBtn.style.display = 'inline-block';
                voiceStatus.textContent = '✓ Transcript ready! Edit if needed, then send or copy.';
            }

            console.log('Speech recognition stopped');
        }

        // Copy transcript to clipboard
        voiceCopyBtn.addEventListener('click', async () => {
            const text = voiceTranscript.textContent.trim();

            if (!text) {
                voiceStatus.textContent = '❌ No text to copy';
                return;
            }

            // Try clipboard API first
            if (navigator.clipboard && navigator.clipboard.writeText) {
                try {
                    await navigator.clipboard.writeText(text);
                    voiceStatus.textContent = '✓ Copied to clipboard! Paste into terminal.';
                    voiceStatus.className = 'success';
                } catch (err) {
                    fallbackCopy(text);
                }
            } else {
                fallbackCopy(text);
            }
        });

        const voiceSendBtn = document.getElementById('voice-send-btn');

        voiceSendBtn.addEventListener('click', () => {
            const text = voiceTranscript.textContent.trim();
            if (!text) {
                voiceStatus.textContent = 'No text to send';
                return;
            }

            if (controlWs && controlWs.readyState === WebSocket.OPEN) {
                sendInput(text);
                voiceStatus.textContent = 'Sent to terminal!';
                voiceStatus.className = 'success';
            } else {
                voiceStatus.textContent = 'Terminal not connected. Use Copy Text instead.';
            }
        });

        function fallbackCopy(text) {
            // Fallback using execCommand
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = text;
            tempTextArea.style.position = 'absolute';
            tempTextArea.style.left = '-9999px';
            document.body.appendChild(tempTextArea);

            tempTextArea.select();

            try {
                const copied = document.execCommand('copy');
                if (copied) {
                    voiceStatus.textContent = '✓ Copied! Paste into terminal.';
                    voiceStatus.className = 'success';
                } else {
                    voiceStatus.textContent = '⚠️ Select text above and press Cmd+C to copy';
                }
            } catch (err) {
                voiceStatus.textContent = '⚠️ Select text above and press Cmd+C to copy';
            }

            document.body.removeChild(tempTextArea);
        }

        // Keyboard shortcuts in voice modal
        voiceModal.addEventListener('keydown', (e) => {
            // Escape to close
            if (e.key === 'Escape') {
                if (isRecording) {
                    stopRecording();
                }
                voiceModal.classList.remove('active');
            }

            // Enter to copy (if text exists and not recording)
            if (e.key === 'Enter' && !isRecording && voiceTranscript.textContent.trim()) {
                voiceCopyBtn.click();
            }

            // Space to start/stop recording (if not editing transcript)
            if (e.key === ' ' && e.target !== voiceTranscript) {
                e.preventDefault();
                voiceRecordBtn.click();
            }
        });

        console.log('Voice input module loaded');
    </script>
</body>
</html>
