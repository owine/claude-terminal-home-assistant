# Claude Terminal tmux configuration

# Terminal type for proper color support
set-option -g default-terminal "xterm-256color"
# Enable true color (24-bit) support
set-option -sa terminal-overrides ",xterm*:Tc"

# Keep panes/windows open when command exits (allows restart)
set -g remain-on-exit on

# Respawn pane with 'R' key when in dead pane (after command exits)
# This lets users restart Claude without refreshing the browser
bind R respawn-pane -k

# Start window and pane numbering at 1 (more intuitive)
set-option -g base-index 1
setw -g pane-base-index 1

# Status bar styling
set -g status-style "fg=white,bg=colour236"
set -g status-left ''
set -g status-right '%a %m-%d %H:%M'

# Mouse support - configurable via app settings and runtime toggle
# Default: off (allows normal browser text selection)
# When enabled: allows mouse scrolling but browser text selection is disabled
# This setting is applied dynamically by run.sh based on tmux_mouse_mode config
# Toggle at runtime: Prefix + m, or use the mouse mode button in the header bar
set -g mouse off

# Toggle mouse mode with Prefix + m (keyboard shortcut alternative to UI button)
bind m set -g mouse \; display "Mouse mode: #{?mouse,ON (scroll),OFF (select)}"

# OSC 52 clipboard support - sends copied text to browser clipboard                                                                                                                                                                                                                                                                                                                                                                                     
set -g set-clipboard on
set -g allow-passthrough on

# Increase scroll-back buffer significantly (default is 2000)
set -g history-limit 50000

# Faster escape time for better vim/nano responsiveness
set -sg escape-time 0

# Show status messages for 2 seconds (default 750ms is too fast in a browser terminal)
set -g display-time 2000

# Pass focus events through to applications (required by Claude Code and vim/neovim
# to detect when the terminal window gains/loses focus)
set -g focus-events on

# Pass extended xterm key sequences through to applications (required for
# Ctrl+Arrow word-jump, Shift+F* keys, and other combos used by Claude Code)
set -g xterm-keys on

# vi-style keys in copy mode
setw -g mode-keys vi

# Advanced copy mode improvements for when mouse mode is enabled
# These work well even with ttyd's mouse handling

# Enter copy mode with mouse scroll (when mouse is enabled)
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Copy on mouse drag end - copies to tmux buffer (OSC 52 handles clipboard)                                                                                                                                                                                                                                                                                                                                                                             
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Double-click word selection
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word

# Triple-click line selection
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line
bind -n TripleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-line
